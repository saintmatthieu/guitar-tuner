name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build libasound2-dev

      - name: Configure
        run: cmake --preset Release

      - name: Build
        run: cmake --build --preset Release --target TestApp

      - name: Create release artifacts
        run: |
          mkdir release
          cp build/Release/saint/TestApp/TestApp release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/TestApp
