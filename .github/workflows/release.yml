name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: TestApp-linux-x86_64
          - os: macos-latest
            artifact: TestApp-macos-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libasound2-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Configure
        run: cmake --preset Release

      - name: Build
        run: cmake --build --preset Release --target TestApp

      - name: Create release artifacts
        run: |
          mkdir release
          cp build/Release/saint/TestApp/TestApp release/${{ matrix.artifact }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/${{ matrix.artifact }}
